# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions


name: GitHub Actions for Witopnet
on:
  push:
    branches:
      - 'main'
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Set up Python 3.12.6
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.12.6

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install black ruff

      - name: Check formatting with black
        run: |
          black --check src tests

      - name: Lint with ruff
        run: |
          ruff check .

  test:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ macos-15, ubuntu-latest ]

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Set up Python 3.12.6
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.12.6

      - name: Install libsodium (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install libsodium
          echo "DYLD_LIBRARY_PATH=$(brew --prefix libsodium)/lib:$DYLD_LIBRARY_PATH" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -e ".[dev]"

      - name: Run tests
        run: |
          pytest tests/

  molecule-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Detect Molecule-relevant changes
        id: detect
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          base_sha="$BASE_SHA"
          if [[ -z "$base_sha" || "$base_sha" == "0000000000000000000000000000000000000000" ]]; then
            base_sha="$(git rev-list --max-parents=0 HEAD | tail -n 1)"
          fi
          changed_files="$(git diff --name-only "$base_sha" "$HEAD_SHA")"
          printf 'Changed files for Molecule gate:\n%s\n' "$changed_files"
          if printf '%s\n' "$changed_files" | grep -Eq '^(ansible/|Makefile$|\.github/workflows/witopnet-app-ci\.yml$)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  molecule:
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
      - molecule-changes
    if: needs.molecule-changes.outputs.changed == 'true'
    permissions:
      contents: read
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Set up Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: Install Molecule dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r ansible/roles/witness_host/molecule/requirements.txt

      - name: Show Docker daemon info
        run: docker info

      - name: Run witness Molecule scenario
        run: make molecule-test