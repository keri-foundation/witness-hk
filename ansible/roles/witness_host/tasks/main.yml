---
- name: Refresh apt package cache on Debian hosts
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when: ansible_facts.pkg_mgr == 'apt'

- name: Install host packages
  ansible.builtin.package:
    name: "{{ witness_system_packages }}"
    state: present
  when: witness_system_packages | length > 0

- name: Ensure witness group exists
  ansible.builtin.group:
    name: "{{ witness_service_group }}"
    system: true

- name: Ensure witness user exists
  ansible.builtin.user:
    name: "{{ witness_service_user }}"
    group: "{{ witness_service_group }}"
    system: true
    shell: "{{ witness_service_shell }}"
    create_home: false

- name: Ensure witness directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop: "{{ witness_directories }}"

- name: Check existing source checkout paths
  ansible.builtin.stat:
    path: "{{ item.dest }}"
  loop: "{{ witness_git_checkouts }}"
  register: witness_host_checkout_paths
  when: witness_checkout_mode == 'source'

- name: Check existing git metadata
  ansible.builtin.stat:
    path: "{{ item.dest }}/.git"
  loop: "{{ witness_git_checkouts }}"
  register: witness_host_checkout_gitdirs
  when: witness_checkout_mode == 'source'

- name: Remove stale non-git source trees so git clone can replace them
  ansible.builtin.file:
    path: "{{ item.0.dest }}"
    state: absent
  loop: "{{ witness_git_checkouts | zip(witness_host_checkout_paths.results, witness_host_checkout_gitdirs.results) | list }}"
  when:
    - witness_checkout_mode == 'source'
    - item.1.stat.exists
    - not item.2.stat.exists

- name: Validate existing git origin remote URLs
  ansible.builtin.command:
    argv:
      - git
      - -c
      - "safe.directory={{ item.0.dest }}"
      - -C
      - "{{ item.0.dest }}"
      - remote
      - get-url
      - origin
  environment:
    GIT_CONFIG_GLOBAL: /dev/null
  loop: "{{ witness_git_checkouts | zip(witness_host_checkout_paths.results, witness_host_checkout_gitdirs.results) | list }}"
  register: witness_host_checkout_origins
  check_mode: false
  changed_when: false
  failed_when: false
  when:
    - witness_checkout_mode == 'source'
    - item.1.stat.exists
    - item.2.stat.exists

- name: Reset stale git source tree tracking
  ansible.builtin.set_fact:
    witness_host_stale_checkout_paths: []
  when: witness_checkout_mode == 'source'

- name: Track stale git source trees with invalid origin remote
  ansible.builtin.set_fact:
    witness_host_stale_checkout_paths: "{{ (witness_host_stale_checkout_paths | default([])) + [item.item.0.dest] }}"
  loop: "{{ witness_host_checkout_origins.results | default([]) }}"
  when:
    - witness_checkout_mode == 'source'
    - item.rc is defined
    - item.rc != 0 or (item.stdout | trim) != item.item.0.repo

- name: Remove stale git source trees with invalid origin remote
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop: "{{ witness_host_stale_checkout_paths | default([]) }}"
  when:
    - witness_checkout_mode == 'source'

- name: Ensure source checkout ownership
  ansible.builtin.file:
    path: "{{ item.dest }}"
    state: directory
    owner: "{{ witness_service_user }}"
    group: "{{ witness_service_group }}"
    recurse: true
  loop: "{{ witness_git_checkouts }}"
  when:
    - witness_checkout_mode == 'source'
    - item.dest in (witness_host_checkout_paths.results | map(attribute='stat') | selectattr('exists') | map(attribute='path') | list)
    - item.dest not in (witness_host_stale_checkout_paths | default([]))

- name: Clone hio and keripy repositories
  ansible.builtin.git:
    repo: "{{ item.0.repo }}"
    dest: "{{ item.0.dest }}"
    version: "{{ item.0.version }}"
    update: true
  environment:
    GIT_CONFIG_GLOBAL: /dev/null
    GIT_CONFIG_COUNT: "1"
    GIT_CONFIG_KEY_0: safe.directory
    GIT_CONFIG_VALUE_0: "{{ item.0.dest }}"
  become: true
  become_user: "{{ witness_service_user }}"
  loop: "{{ witness_git_checkouts | zip(witness_host_checkout_paths.results, witness_host_checkout_gitdirs.results) | list }}"
  when:
    - witness_checkout_mode == 'source'
    - not (ansible_check_mode and item.0.dest in (witness_host_stale_checkout_paths | default([])))

- name: Ensure source checkout ownership after clone
  ansible.builtin.file:
    path: "{{ item.dest }}"
    state: directory
    owner: "{{ witness_service_user }}"
    group: "{{ witness_service_group }}"
    recurse: true
  loop: "{{ witness_git_checkouts }}"
  when: witness_checkout_mode == 'source'

- name: Ensure witness wrapper directory exists
  ansible.builtin.file:
    path: "{{ witness_keripy_home }}/ops"
    state: directory
    owner: "{{ witness_service_user }}"
    group: "{{ witness_service_group }}"
    mode: "0755"

- name: Ensure witness virtualenv path ownership
  ansible.builtin.file:
    path: "{{ witness_venv_path }}"
    state: directory
    owner: "{{ witness_service_user }}"
    group: "{{ witness_service_group }}"
    mode: "0755"

- name: Install witness Python runtime as service user
  become: true
  become_user: "{{ witness_service_user }}"
  block:
    - name: Create witness virtualenv
      ansible.builtin.command:
        argv:
          - "{{ witness_python_bootstrap_bin }}"
          - -m
          - venv
          - "{{ witness_venv_path }}"
      args:
        creates: "{{ witness_venv_path }}/bin/python"
      when: not ansible_check_mode

    - name: Bootstrap pip inside the witness virtualenv
      ansible.builtin.command:
        argv:
          - "{{ witness_python_bin }}"
          - -m
          - ensurepip
          - --upgrade
      args:
        creates: "{{ witness_venv_path }}/bin/pip"
      when: not ansible_check_mode

    - name: Install Python packages required for Circus
      ansible.builtin.pip:
        name: "{{ witness_python_packages }}"
        executable: "{{ witness_pip_executable }}"
      when:
        - not ansible_check_mode
        - witness_python_packages | length > 0

    - name: Install editable local hio and keripy packages
      ansible.builtin.pip:
        name: "{{ item }}"
        editable: true
        executable: "{{ witness_pip_executable }}"
      loop: "{{ witness_editable_python_paths }}"
      when:
        - not ansible_check_mode
        - witness_checkout_mode == 'source'

- name: Render run-keripy-witness wrapper
  ansible.builtin.template:
    src: run-keripy-witness.sh.j2
    dest: "{{ witness_wrapper_path }}"
    owner: "{{ witness_service_user }}"
    group: "{{ witness_service_group }}"
    mode: "0755"
  notify: Restart witness service

- name: Render Circus config
  ansible.builtin.template:
    src: circus-witness.ini.j2
    dest: "{{ witness_circus_config_path }}"
    owner: root
    group: "{{ witness_service_group }}"
    mode: "0640"
  notify: Restart witness service

- name: Render systemd unit
  ansible.builtin.template:
    src: circusd-witness.service.j2
    dest: "{{ witness_service_unit_path }}"
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart witness service

- name: Enable and start witness service
  ansible.builtin.systemd_service:
    name: "{{ witness_systemd_service_name }}"
    daemon_reload: true
    enabled: true
    state: started
  when: not ansible_check_mode
